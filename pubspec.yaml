name: inertiax
description: InertiaX Force Platform Analysis App
version: 1.0.22+22
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.2

  # UI / Charts
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Serial communication — desktop (Windows/macOS/Linux)
  flutter_libserialport: ^0.3.0
  # Android USB OTG serial
  usb_serial: ^0.5.0
  # iOS Bluetooth LE
  flutter_blue_plus: ^1.32.12

  # Database
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Cloud sync
  supabase_flutter: ^2.5.3

  # PDF reports
  pdf: ^3.11.0
  printing: ^5.13.0

  # File picker (importar DB desde versión anterior)
  file_picker: ^8.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3

  # Platform detection
  universal_io: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
